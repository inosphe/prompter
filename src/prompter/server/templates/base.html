<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}prompter{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">📋 prompter</a>
    <nav class="tabs">
      {% for k in kinds %}
        <a href="/?kind={{ k }}" class="tab {% if k == kind and not archived_view and not templates_view %}active{% endif %}">
          {{ "Context" if k == "context" else "Prompts" }}
        </a>
      {% endfor %}
      <a href="/templates?kind={{ kind }}" class="tab {% if templates_view %}active{% endif %}">템플릿</a>
      <a href="/skills" class="tab {% if skills_view %}active{% endif %}">Skills</a>
      <a href="/archived" class="tab {% if archived_view %}active{% endif %}">보관함</a>
    </nav>
    <a class="btn primary" href="/new?kind={{ kind }}">+ 새 스니펫</a>
  </header>

  <main class="layout">
    <section class="content">
      {% block content %}{% endblock %}
    </section>

    <aside class="cart" id="cart-panel">
      <div class="cart-head">
        <h2>누적 복사 <span class="badge" id="cart-count">0</span></h2>
        <div class="cart-actions">
          <button class="btn small" onclick="copyCart()">전체 복사</button>
          <button class="btn small ghost" onclick="clearCart()">비우기</button>
        </div>
      </div>
      <label class="cart-option">
        <input type="checkbox" id="cart-markers" onchange="onCartMarkersToggle(this)" />
        블록 마커 포함
      </label>
      <ul class="cart-list" id="cart-list"></ul>
      <p class="cart-empty" id="cart-empty">카드의 “담기”를 눌러 모았다가 한 번에 복사하세요.</p>
      <div class="cart-save" data-kind="{{ kind }}">
        <input type="text" id="tpl-name" placeholder="템플릿 이름 (예: review-set)" />
        <button class="btn small primary" onclick="saveTemplate()">템플릿으로 저장</button>
        <p class="hint" id="tpl-save-hint">현재 <b>{{ "Context" if kind == "context" else "Prompt" }}</b> 담김 항목이 저장됩니다.</p>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
